<!DOCTYPE html>
<html lang="en">
<head>
    <script src="./coi-serviceworker.js"></script>
    <meta charset="UTF-8">
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARK SYSTEM</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header><h1>SPARK <span>SYSTEM</span></h1></header>
    <main class="dashboard-grid">
        <section class="card">
            <div class="card-title">YOLO-Pro Object Detection</div>
            <div class="video-container" style="position: relative; background: #000; aspect-ratio: 4/3;">
                <video id="webcam" autoplay playsinline muted style="width: 100%; height: 100%; object-fit: cover;"></video>
                <canvas id="detection-canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></canvas>
            </div>
            <div class="info-bar"><p>Status: <span id="labels-container">Initializing...</span></p></div>
        </section>
    </main>
    <script>
        async function startApp() {
            const label = document.getElementById('labels-container');
            const load = (src) => new Promise((res, rej) => {
                const s = document.createElement('script');
                s.src = './' + src + '?v=' + Date.now();
                s.onload = res; s.onerror = rej;
                document.body.appendChild(s);
            });
            try {
                label.innerText = "Loading AI Engine...";
                await load('edge-impulse-standalone.js');
                await load('app.js');
                if (window.initAI) await window.initAI();
            } catch (e) { label.innerText = "Files missing from GitHub! Re-upload them."; }
        }
        window.onload = startApp;
    </script>
</body>
</html>
