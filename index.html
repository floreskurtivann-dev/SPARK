<!DOCTYPE html>
<html lang="en">
<head>
    <script src="coi-serviceworker.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARK | AI Energy Dashboard</title>
    
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <header>
        <h1>SPARK <span>SYSTEM</span></h1>
        <div class="controls">
            <button id="btn-connect">Connect Arduino</button>
            <span id="statusText">🔴 Offline</span>
        </div>
    </header>

    <main class="dashboard-grid">
        <section class="card">
            <div class="card-title">YOLO-Pro Object Detection</div>
            <div class="video-container">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="detection-canvas"></canvas>
            </div>
            <div class="info-bar">
                <p>Status: <span id="labels-container">Initializing System...</span></p>
            </div>
        </section>

        <section class="card">
            <div class="card-title">Piezo Energy Harvesting</div>
            <div class="metrics">
                <div class="m-box">
                    <small>VOLTAGE</small>
                    <div class="val"><span id="cur-val">0.00</span>V</div>
                </div>
                <div class="m-box">
                    <small>TOTAL ENERGY</small>
                    <div class="val"><span id="total-val">0.00</span>J</div>
                </div>
            </div>
            <div class="chart-wrapper">
                <canvas id="energyChart"></canvas>
            </div>
        </section>
    </main>

    <script src="app.js"></script>

</body>
</html>
